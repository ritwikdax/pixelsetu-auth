name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  AZURE_CONTAINER_APP: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
  AZURE_CONTAINERAPPS_ENV: ${{ secrets.AZURE_CONTAINERAPPS_ENV }} # REQUIRED for create
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: pixelsetu-auth-svc
  LOCATION: ${{ secrets.AZURE_LOCATION }} # e.g. eastasia / centralindia

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Azure Login (OIDC)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🐳 Login to ACR
      - name: Login to ACR
        run: |
          az acr login --name $ACR_NAME

      # 🏗️ Build Image
      - name: Build Docker image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            .

      # 🚀 Push Image
      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

      # 🔍 Check if Container App exists
      - name: Check if Container App exists
        id: check_app
        run: |
          if az containerapp show \
            --name $AZURE_CONTAINER_APP \
            --resource-group $AZURE_RESOURCE_GROUP > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 🆕 Create Container App (if NOT exists)
      - name: Create Container App
        if: steps.check_app.outputs.exists == 'false'
        run: |
          az containerapp create \
            --name $AZURE_CONTAINER_APP \
            --resource-group $AZURE_RESOURCE_GROUP \
            --environment $AZURE_CONTAINERAPPS_ENV \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            --target-port 3000 \
            --ingress external \
            --registry-server $ACR_NAME.azurecr.io \
            --query properties.configuration.ingress.fqdn \
            --registry-identity system

      # 🔄 Update Container App (if exists)
      - name: Update Container App
        if: steps.check_app.outputs.exists == 'true'
        run: |
          az containerapp update \
            --name $AZURE_CONTAINER_APP \
            --resource-group $AZURE_RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
            --revision-suffix ${{ github.sha }}

      # 📦 Output
      - name: Output image details
        run: |
          echo "Image pushed:"
          echo "$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"